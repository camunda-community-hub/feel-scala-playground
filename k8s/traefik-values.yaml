ingressClass:
  enabled: true
  isDefaultClass: true
  name: traefik

ports:
  web:
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    http:
      tls:
        enabled: true

service:
  spec:
    type: LoadBalancer
    loadBalancerIP: 35.236.247.128

providers:
  kubernetesIngress:
    enabled: true
    allowExternalNameServices: false
  kubernetesCRD:
    enabled: true
